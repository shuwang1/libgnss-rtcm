name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test (Swift 6.0)
    runs-on: ubuntu-latest
   
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: "6.3"
         

      - name: Build
        run: swift build -v

      - name: Run Tests
        run: swift test -v --enable-code-coverage
        
      - name: Upload
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_SHUWANG1_LIBGNSS_RTCM_TOKEN }}
